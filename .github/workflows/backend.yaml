name: Backend CI

on:
  push:
    branches:
      - main
    paths:
      - 'backend/server/**'

jobs:
  backend-test:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/server

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test